<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Feedback Registration Form</title>

  <!-- ═══════════════════════════════════════════════════════════════
       Sub Task 2 (External CSS) – linked stylesheet
  ════════════════════════════════════════════════════════════════ -->
  <link rel="stylesheet" href="style.css" />

  <!-- ═══════════════════════════════════════════════════════════════
       Sub Task 2 (Internal CSS) – embedded in <style> block
  ════════════════════════════════════════════════════════════════ -->
  <style>
    /* ── Internal CSS: supplementary & component-specific rules ── */

    /* Animated underline on header h1 */
    .form-header h1 span {
      position: relative;
      display: inline-block;
    }
    .form-header h1 span::after {
      content: '';
      position: absolute;
      left: 0; bottom: -3px;
      width: 0; height: 2px;
      background: var(--amber);
      animation: expandLine 1.2s ease 0.4s forwards;
    }
    @keyframes expandLine {
      to { width: 100%; }
    }

    /* Institution logo placeholder */
    .inst-logo {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      margin-bottom: 14px;
      border: 1.5px solid rgba(255,255,255,0.2);
    }

    /* Sticky footer attribution */
    .form-footer {
      margin-top: 18px;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      text-align: center;
    }

    /* Floating label hint on focus */
    .form-group input:focus::placeholder,
    .form-group textarea:focus::placeholder {
      opacity: 0.4;
    }

    /* Required asterisk pulse animation */
    .req {
      display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* Department select custom focus ring color */
    #department:focus {
      border-color: var(--amber-dark);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
    }

    /* Submit button loading state */
    .btn-submit.loading {
      opacity: 0.8;
      pointer-events: none;
      position: relative;
    }
    .btn-submit.loading::after {
      content: '';
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 8px;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider line between sections */
    .section-divider {
      height: 1px;
      background: linear-gradient(to right, var(--amber), transparent);
      margin: 28px 0 0;
      opacity: 0.4;
    }

    /* Mobile responsive tweaks */
    @media (max-width: 400px) {
      .btn-row { flex-direction: column-reverse; }
      .btn     { width: 100%; justify-content: center; }
    }
  </style>
</head>

<body>
  <!-- ════════════════════════════════════════════════════
       Sub Task 1: HTML FORM STRUCTURE
  ════════════════════════════════════════════════════ -->
  <div class="page-wrapper">

    <!-- Progress indicator dots -->
    <div class="progress-bar" aria-label="Form completion progress">
      <div class="p-dot" title="Field 1"></div>
      <div class="p-dot" title="Field 2"></div>
      <div class="p-dot" title="Field 3"></div>
      <div class="p-dot" title="Field 4"></div>
      <div class="p-dot" title="Field 5"></div>
    </div>

    <!-- Header -->
    <header class="form-header" role="banner">
      <div class="inst-logo" aria-hidden="true">🎓</div>
      <div class="badge">Academic Portal</div>
      <h1><span>Student Feedback</span><br>Registration Form</h1>
      <p>Help us improve. Your honest feedback matters to us.</p>
    </header>

    <!-- ── Main Form Card ── -->
    <main class="form-card" role="main">
      <form id="feedbackForm" novalidate autocomplete="off">

        <!-- ── Section: Personal Information ── -->
        <p class="form-section-label">Personal Information</p>

        <div class="form-row">
          <!-- Student Name -->
          <div class="form-group">
            <label for="studentName">
              Student Name <span class="req" aria-hidden="true">*</span>
            </label>
            <input
              type="text"
              id="studentName"
              name="studentName"
              placeholder="Full name"
              maxlength="80"
              aria-required="true"
              aria-describedby="studentNameError"
            />
            <span class="error-msg" id="studentNameError" role="alert"></span>
          </div>

          <!-- Email ID -->
          <div class="form-group">
            <label for="email">
              Email ID <span class="req" aria-hidden="true">*</span>
            </label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@university.edu"
              maxlength="120"
              aria-required="true"
              aria-describedby="emailError"
            />
            <span class="error-msg" id="emailError" role="alert"></span>
          </div>
        </div>

        <div class="form-row">
          <!-- Mobile Number -->
          <div class="form-group">
            <label for="mobile">
              Mobile Number <span class="req" aria-hidden="true">*</span>
            </label>
            <input
              type="tel"
              id="mobile"
              name="mobile"
              placeholder="10-digit mobile number"
              maxlength="10"
              inputmode="numeric"
              aria-required="true"
              aria-describedby="mobileError"
            />
            <span class="error-msg" id="mobileError" role="alert"></span>
          </div>

          <!-- Department -->
          <div class="form-group">
            <label for="department">
              Department <span class="req" aria-hidden="true">*</span>
            </label>
            <div class="select-wrapper">
              <select
                id="department"
                name="department"
                aria-required="true"
                aria-describedby="departmentError"
              >
                <option value="">— Select Department —</option>
                <option value="CSE">Computer Science &amp; Engineering</option>
                <option value="IT">Information Technology</option>
                <option value="ECE">Electronics &amp; Communication</option>
                <option value="EE">Electrical Engineering</option>
                <option value="ME">Mechanical Engineering</option>
                <option value="CE">Civil Engineering</option>
                <option value="MBA">Master of Business Administration</option>
                <option value="MCA">Master of Computer Applications</option>
              </select>
            </div>
            <span class="error-msg" id="departmentError" role="alert"></span>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- ── Section: Gender ── -->
        <p class="form-section-label">Gender</p>

        <div class="form-group">
          <div class="gender-group" role="radiogroup" aria-required="true" aria-describedby="genderError">
            <label class="radio-label" for="genderMale">
              <input type="radio" id="genderMale"   name="gender" value="male"   />
              ♂ Male
            </label>
            <label class="radio-label" for="genderFemale">
              <input type="radio" id="genderFemale" name="gender" value="female" />
              ♀ Female
            </label>
            <label class="radio-label" for="genderOther">
              <input type="radio" id="genderOther"  name="gender" value="other"  />
              ⚧ Other
            </label>
          </div>
          <span class="error-msg" id="genderError" role="alert"></span>
        </div>

        <div class="section-divider"></div>

        <!-- ── Section: Feedback ── -->
        <p class="form-section-label">Your Feedback</p>

        <div class="form-row full">
          <div class="form-group">
            <label for="feedback">
              Feedback Comments <span class="req" aria-hidden="true">*</span>
            </label>
            <textarea
              id="feedback"
              name="feedback"
              placeholder="Share your experience, suggestions, or comments about the course, faculty, or infrastructure… (minimum 10 words)"
              rows="5"
              aria-required="true"
              aria-describedby="feedbackError"
            ></textarea>
            <span class="char-hint" id="wordCount">0 words (min. 10 required)</span>
            <span class="error-msg" id="feedbackError" role="alert"></span>
          </div>
        </div>

        <!-- ── Buttons ── -->
        <div class="btn-row">
          <button type="reset" id="resetBtn" class="btn btn-reset">
            ↺ Reset
          </button>
          <button type="submit" id="submitBtn" class="btn btn-submit">
            Submit Feedback →
          </button>
        </div>

      </form>
    </main><!-- /form-card -->

    <p class="form-footer">
      Academic Feedback System &nbsp;·&nbsp; All fields marked <span style="color:var(--amber-dark)">*</span> are required
    </p>

  </div><!-- /page-wrapper -->

  <!-- Success Toast Notification -->
  <div id="successToast" role="status" aria-live="polite"></div>

  <!-- Sub Task 3: External JavaScript Validation -->
  <script src="validate.js"></script>
</body>
</html>
